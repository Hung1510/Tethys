<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Tethys">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#061019"/>
      <stop offset="1" stop-color="#0a2130"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- tide: glow then core then highlight -->
  <path d="M8 41 Q20 29 32 39 T56 37" fill="none" stroke="#35e0d0" stroke-width="6.5" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <path d="M8 41 Q20 29 32 39 T56 37" fill="none" stroke="#35e0d0" stroke-width="5.4" stroke-linecap="round"/>
  <path d="M8 38 Q20 26 32 36 T56 34" fill="none" stroke="#aaf6ec" stroke-width="1.8" stroke-linecap="round"/>
  <!-- celestial star -->
  <path d="M46 9 L49 15 L55 18 L49 21 L46 27 L43 21 L37 18 L43 15 Z" fill="#eafcff"/>
</svg>
